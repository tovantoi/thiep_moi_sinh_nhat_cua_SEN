<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>🎉 Party Time! Sinh Nhật SEN - 15/04/2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-pink: #ff7eb3;
        --color-blue: #6dd5fa;
        --color-yellow: #feca57;
        --color-purple: #a29bfe;
        --color-text: #2d3436;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background-color: #fff5f7;
        color: var(--color-text);
        line-height: 1.6;
        min-height: 100vh;
        overflow: hidden;
      }

      #falling-petals-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        transition: all 0.8s ease-in-out;
      }

      #enter-button {
        background: linear-gradient(to right, #ff7eb3, #feca57, #6dd5fa);
        color: white;
        border: none;
        padding: 20px 50px;
        font-size: 1.6rem;
        font-family: "Pacifico", cursive;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: pulse 1.5s infinite;
        border: 3px solid white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08) rotate(-2deg);
        }
        100% {
          transform: scale(1);
        }
      }

      #loader-wrapper.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: scale(1.2);
      }

      #main-content {
        position: relative;
        z-index: 10;
        opacity: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 1s ease;
        padding: 15px;
      }

      #main-content.show {
        opacity: 1;
      }

      .container {
        width: 100%;
        max-width: 600px;
        height: 90vh;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 25px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        border: 2px solid white;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      header {
        flex-shrink: 0;
        padding: 30px 20px 15px 20px;
        background: white;
        border-bottom: none;
        z-index: 50;
        position: sticky;
        top: 0;
      }

      .photo-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 15px;
      }

      .photo-frame {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      header h1 {
        font-family: "Pacifico", cursive;
        font-size: 2.8rem;
        background: linear-gradient(to right, #ff6b6b, #845ec2, #ff9ff3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
        margin-bottom: 5px;
      }

      header p {
        text-align: center;
        font-size: 1.1rem;
        color: #555;
        font-weight: bold;
      }

      /* DÂY CỜ TRANG TRÍ */
      .decorative-banner {
        display: flex;
        justify-content: center;
        width: 100%;
        margin: 10px 0;
        position: relative;
      }
      .decorative-banner::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: #ddd;
        z-index: -1;
      }
      .flag {
        width: 0;
        height: 0;
        border-left: 15px solid transparent;
        border-right: 15px solid transparent;
        position: relative;
        margin: 0 5px;
      }
      .flag.strawberry {
        border-top: 35px solid #ff9a9e;
      }
      .flag.heart {
        border-top: 35px solid #fff3e0;
      }
      .flag.heart::after {
        content: "❤️";
        color: #ff5252;
        font-size: 12px;
        position: absolute;
        top: -25px;
        left: -7px;
      }
      .flag.dots-pink {
        border-top: 35px solid #f8bbd0;
        background-image: radial-gradient(white 15%, transparent 15%);
        background-size: 6px 6px;
      }
      .flag.stripes-blue {
        border-top: 35px solid #b3e5fc;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 5px,
          rgba(255, 255, 255, 0.5) 5px,
          rgba(255, 255, 255, 0.5) 10px
        );
      }
      .flag.stripes-pink {
        border-top: 35px solid #f48fb1;
        background-image: repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 5px,
          rgba(255, 255, 255, 0.5) 5px,
          rgba(255, 255, 255, 0.5) 10px
        );
      }
      .flag.flower {
        border-top: 35px solid #e1bee7;
      }
      .flag.flower::after {
        content: "🌸";
        font-size: 12px;
        position: absolute;
        top: -25px;
        left: -7px;
      }

      .scroll-area {
        flex: 1;
        height: 0;
        overflow-y: auto;
        padding: 20px;
        scroll-behavior: smooth;
        display: flex;
        flex-direction: column;
        align-items: center;
        scrollbar-width: none;
        -ms-overflow-style: none;
        overflow-x: hidden; /* Tránh vuốt ngang trên điện thoại */
      }

      .scroll-area::-webkit-scrollbar {
        display: none;
      }

      .letter-wrapper {
        position: relative;
        background: white;
        padding: 25px 30px;
        border-radius: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        border: 4px solid transparent;
        background-image:
          linear-gradient(white, white),
          linear-gradient(135deg, #ff9a9e, #feca57, #6dd5fa, #a29bfe);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        display: inline-block;
        text-align: center;
        max-width: 100%; /* Quan trọng cho mobile */
      }

      #letter-content {
        font-size: 1.15rem;
        white-space: pre-line;
        min-height: 80px;
        font-weight: 700;
        color: #4a148c;
        line-height: 1.8;
        font-family: monospace;
        text-align: left;
        display: inline-block;
      }

      .sticker {
        position: absolute;
        font-size: 2.5rem;
        z-index: 5;
        pointer-events: none;
        animation: floatSticker 4s ease-in-out infinite;
        filter: drop-shadow(2px 4px 5px rgba(0, 0, 0, 0.2));
      }

      .stk-1 {
        top: -20px;
        left: -10px;
        transform: rotate(-15deg);
      }
      .stk-2 {
        bottom: -20px;
        right: -10px;
        transform: rotate(10deg);
        font-size: 3rem;
        animation-delay: 1s;
      }
      .stk-3 {
        top: -20px;
        right: -10px;
        font-size: 2rem;
        animation-delay: 2s;
      }

      @keyframes floatSticker {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(10deg);
        }
      }

      .details-container {
        display: none;
        flex-direction: column;
        gap: 15px;
        opacity: 0;
        transition: opacity 1s ease;
        width: 100%;
        margin-top: 20px;
      }

      .details-container.show {
        opacity: 1;
        display: flex;
      }

      .detail-box {
        display: flex;
        align-items: center;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        transition: transform 0.3s;
        width: 100%;
      }

      .box-time {
        background: #e0f7fa;
        border: 2px solid #81d4fa;
      }
      .box-place {
        background: #fce4ec;
        border: 2px solid #f48fb1;
      }
      .box-dress {
        background: #fff8e1;
        border: 2px solid #ffe082;
      }

      .icon {
        font-size: 2rem;
        margin-right: 15px;
        filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.1));
      }

      .info h3 {
        font-size: 0.8rem;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 2px;
      }

      .info p {
        font-weight: 800;
        font-size: 1.1rem;
        color: #333;
        margin: 0;
        font-family: "Quicksand", sans-serif;
      }

      .typewriter-cursor {
        display: inline-block;
        width: 4px;
        background-color: #ff4757;
        animation: blink 1s infinite;
        height: 1.3em;
        vertical-align: text-bottom;
        margin-left: 2px;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      footer {
        text-align: center;
        margin-top: 20px;
        font-weight: 700;
        color: #888;
        font-size: 1rem;
        padding-bottom: 20px;
        width: 100%;
      }

      /* ========================================= */
      /* CSS RESPONSIVE DÀNH RIÊNG CHO ĐIỆN THOẠI  */
      /* ========================================= */
      @media (max-width: 768px) {
        #main-content {
          padding: 10px;
        }
        .container {
          height: 95vh;
          border-radius: 15px;
        }
        header {
          padding: 15px 10px 10px 10px;
        }

        /* Thu nhỏ ảnh đại diện */
        .photo-frame {
          width: 80px;
          height: 80px;
          border-width: 3px;
        }
        .photo-container {
          gap: 10px;
          margin-bottom: 10px;
        }

        header h1 {
          font-size: 2.2rem;
        }
        header p {
          font-size: 0.95rem;
          margin-top: 0;
        }

        /* Thu nhỏ cờ trang trí */
        .flag {
          border-left-width: 10px;
          border-right-width: 10px;
        }
        .flag.strawberry,
        .flag.heart,
        .flag.dots-pink,
        .flag.stripes-blue,
        .flag.stripes-pink,
        .flag.flower {
          border-top-width: 25px;
        }
        .flag.heart::after,
        .flag.flower::after {
          top: -18px;
          left: -5px;
          font-size: 10px;
        }

        .scroll-area {
          padding: 10px;
        }

        /* Thu nhỏ padding của thư */
        .letter-wrapper {
          padding: 15px 10px;
          margin-top: 10px;
          width: 100%;
          box-sizing: border-box;
        }

        /* CỰC KỲ QUAN TRỌNG: Thu nhỏ font chữ để giữ nguyên khung ASCII không bị bẻ dòng */
        #letter-content {
          font-size: 0.75rem;
          line-height: 1.6;
        }

        /* Giảm kích thước sticker để không che mất chữ */
        .sticker {
          font-size: 1.8rem !important;
        }
        .stk-1 {
          left: 0px;
          top: -15px;
        }
        .stk-2 {
          right: 0px;
          bottom: -15px;
          font-size: 2.2rem !important;
        }
        .stk-3 {
          right: 0px;
          top: -15px;
        }

        /* Thu nhỏ các hộp thông tin */
        .detail-box {
          padding: 12px;
        }
        .icon {
          font-size: 1.5rem;
          margin-right: 10px;
        }
        .info p {
          font-size: 0.95rem;
        }
        footer {
          font-size: 0.85rem;
          margin-top: 10px;
        }
      }

      /* Cho các điện thoại màn hình cực nhỏ (như iPhone SE) */
      @media (max-width: 380px) {
        #letter-content {
          font-size: 0.65rem;
        }
        header h1 {
          font-size: 1.8rem;
        }
        .photo-frame {
          width: 70px;
          height: 70px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="falling-petals-canvas"></canvas>

    <audio id="background-music" loop>
      <source src="sound.mp3" type="audio/mpeg" />
    </audio>

    <div id="loader-wrapper">
      <div style="text-align: center">
        <p style="font-size: 4rem; margin-bottom: 10px">🎉</p>
        <button id="enter-button">Nhấn để mở Tiệc! 🎁</button>
      </div>
    </div>

    <div id="main-content">
      <div class="container">
        <header>
          <div class="photo-container">
            <img src="4.jpg" alt="SEN" class="photo-frame" />
            <img src="7.jpg" alt="SEN" class="photo-frame" />
          </div>
          <h1>Happy Birthday SEN!</h1>
          <p>Let's Party All Night! 🪩🕺💃</p>

          <div class="decorative-banner">
            <div class="flag strawberry"></div>
            <div class="flag heart"></div>
            <div class="flag dots-pink"></div>
            <div class="flag stripes-blue"></div>
            <div class="flag stripes-pink"></div>
            <div class="flag flower"></div>
            <div class="flag heart"></div>
            <div class="flag stripes-blue"></div>
          </div>
        </header>

        <div class="scroll-area" id="scroll-area">
          <div class="letter-wrapper">
            <div class="sticker stk-1">🎈</div>
            <div class="sticker stk-2">🎂</div>
            <div class="sticker stk-3">🎁</div>

            <div id="letter-content"></div>
          </div>

          <div style="position: relative; width: 100%">
            <div
              class="sticker"
              style="top: -20px; left: -5px; font-size: 2rem"
            >
              🎉
            </div>
            <div
              class="sticker"
              style="bottom: 10%; right: 5%; font-size: 2.5rem"
            >
              🥳
            </div>
            <div class="sticker" style="top: 40%; left: 5%; font-size: 1.5rem">
              💖
            </div>
            <div
              class="sticker"
              style="bottom: 30%; left: 0px; font-size: 2rem"
            >
              🌈
            </div>
            <div
              class="sticker"
              style="top: -10px; right: -5px; font-size: 1.5rem"
            >
              🥂
            </div>

            <div class="details-container" id="details-box">
              <div class="detail-box box-time">
                <div class="icon">⏰</div>
                <div class="info">
                  <h3>Thời gian nhập tiệc</h3>
                  <p>19:00 - Thứ Tư, 15/04/2026</p>
                </div>
              </div>
              <div class="detail-box box-place">
                <div class="icon">📍</div>
                <div class="info">
                  <h3>Tọa độ quẩy</h3>
                  <p>Quán LÚA - HÀM GIANG</p>
                </div>
              </div>
              <div class="detail-box box-dress">
                <div class="icon">👗</div>
                <div class="info">
                  <h3>Trang phục</h3>
                  <p>Tự do, Rực rỡ & Cháy phố! 🔥</p>
                </div>
              </div>

              <footer><p>Hóng sự có mặt của bạn! Love, SEN ❤️</p></footer>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("falling-petals-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let petals = [];
      const colors = [
        "#ff4757",
        "#1e90ff",
        "#2ed573",
        "#ffa502",
        "#eccc68",
        "#ff6b81",
      ];

      class Petal {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.w = 8 + Math.random() * 12;
          this.h = 8 + Math.random() * 12;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.xSpeed = Math.random() * 3 - 1.5;
          this.ySpeed = 1.5 + Math.random() * 3;
          this.rotation = Math.random() * 360;
          this.rotationSpeed = Math.random() * 6 - 3;
          this.isCircle = Math.random() > 0.5;
        }
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate((this.rotation * Math.PI) / 180);
          ctx.fillStyle = this.color;
          if (this.isCircle) {
            ctx.beginPath();
            ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
          }
          ctx.restore();
        }
        animate() {
          this.y += this.ySpeed;
          this.x += this.xSpeed;
          this.rotation += this.rotationSpeed;
          if (this.y > canvas.height) {
            this.y = -20;
            this.x = Math.random() * canvas.width;
          }
          this.draw();
        }
      }

      for (let i = 0; i < 100; i++) petals.push(new Petal());
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        petals.forEach((p) => p.animate());
        requestAnimationFrame(animate);
      }
      animate();

      const enterButton = document.getElementById("enter-button");
      const loader = document.getElementById("loader-wrapper");
      const letterContentElement = document.getElementById("letter-content");
      const detailsBox = document.getElementById("details-box");
      const mainContent = document.getElementById("main-content");
      const scrollArea = document.getElementById("scroll-area");
      const music = document.getElementById("background-music");

      const letterText = `
╔══════════════════════════════════════╗
    ✨🎂  THIỆP MỜI SINH NHẬT  🎂✨
╚══════════════════════════════════════╝

💌  Trân trọng kính mời,

      🌙 Một năm nữa lại khẽ trôi qua và SEN lại có thêm một cột mốc đáng nhớ trong hành trình của mình.

      💫 Nhân dịp đặc biệt này, SEN muốn dành một buổi tiệc nhỏ, ấm cúng để cùng những người thân thương chia sẻ niềm vui và tạo nên những kỷ niệm thật đẹp.

🎁  Sự hiện diện của bạn chính là niềm vinh hạnh và cũng là món quà ý nghĩa nhất dành cho SEN trong ngày sinh nhật.

🍷  Chúng ta sẽ cùng nhau:
      ✨ Nâng ly chúc mừng
      🎂 Thổi nến sinh nhật
      🍰 Cắt bánh ngọt
      🥂 Và tận hưởng một buổi tối đầy tiếng cười và sự gắn kết.

💖  SEN rất mong được đón tiếp bạn tại bữa tiệc sinh nhật lần này.  
    Sự có mặt của bạn sẽ làm cho khoảnh khắc ấy trở nên trọn vẹn hơn.

╔══════════════════════════════════════╗
      🎉  Trân trọng kính mời  🎉
                  SEN ✨
╚══════════════════════════════════════╝
`;

      function typewriter(element, text, speed = 30) {
        let i = 0;
        element.innerHTML = "";
        const cursor = document.createElement("span");
        cursor.className = "typewriter-cursor";
        element.appendChild(cursor);

        function type() {
          if (i < text.length) {
            if (text.charAt(i) === "\n") {
              element.insertBefore(document.createElement("br"), cursor);
            } else {
              element.insertBefore(
                document.createTextNode(text.charAt(i)),
                cursor,
              );
            }
            i++;
            if (i % 5 === 0) {
              scrollArea.scrollTop = scrollArea.scrollHeight;
            }
            setTimeout(type, speed);
          } else {
            cursor.style.display = "none";
            detailsBox.style.display = "flex";
            setTimeout(() => {
              detailsBox.classList.add("show");
              scrollArea.scrollTop = scrollArea.scrollHeight;
            }, 50);
          }
        }
        type();
      }

      enterButton.addEventListener("click", () => {
        loader.classList.add("hidden");
        mainContent.classList.add("show");

        var playPromise = music.play();
        if (playPromise !== undefined) {
          playPromise.catch((error) => {
            console.log("Cần tương tác người dùng để phát nhạc.");
          });
        }

        setTimeout(() => typewriter(letterContentElement, letterText), 500);
      });

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
