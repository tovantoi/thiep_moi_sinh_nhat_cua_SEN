<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎉 Party Time! Sinh Nhật SEN - 04/03/2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-pink: #ff7eb3;
        --color-blue: #6dd5fa;
        --color-yellow: #feca57;
        --color-purple: #a29bfe;
        --color-text: #2d3436;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(
          -45deg,
          var(--color-pink),
          var(--color-yellow),
          var(--color-blue),
          var(--color-purple)
        );
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: var(--color-text);
        line-height: 1.6;
        min-height: 100vh;
        overflow: hidden;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      #falling-petals-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        transition: all 0.8s ease-in-out;
      }

      #enter-button {
        background: linear-gradient(to right, #ff7eb3, #feca57, #6dd5fa);
        color: white;
        border: none;
        padding: 20px 50px;
        font-size: 1.5rem;
        font-family: "Pacifico", cursive;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: pulse 2s infinite;
        border: 2px solid white;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      #loader-wrapper.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #main-content {
        position: relative;
        z-index: 10;
        opacity: 0;
        padding: 20px;
        height: 100vh;
        overflow-y: auto;
        transition: opacity 1s ease;
      }

      #main-content.show {
        opacity: 1;
      }

      .container {
        max-width: 650px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        border: 2px solid white;
      }

      /* CSS cho ảnh */
      .photo-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }
      .photo-frame {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s;
      }
      .photo-frame:hover {
        transform: scale(1.05) rotate(3deg);
      }

      header h1 {
        font-family: "Pacifico", cursive;
        font-size: 2.8rem;
        background: linear-gradient(
          to right,
          var(--color-pink),
          var(--color-blue)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
        margin-bottom: 10px;
      }
      header p {
        text-align: center;
        font-size: 1.1rem;
        color: #555;
      }

      h2.party-title {
        text-align: center;
        font-size: 1.8rem;
        color: var(--color-purple);
        margin: 30px 0;
      }

      #letter-content {
        font-size: 1.1rem;
        white-space: pre-line;
        min-height: 100px;
        margin-bottom: 30px;
      }

      .details-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        opacity: 0;
        transition: opacity 1s ease;
      }
      .details-container.show {
        opacity: 1;
      }

      .detail-box {
        display: flex;
        align-items: center;
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        border-left: 5px solid;
      }
      .icon {
        font-size: 2rem;
        margin-right: 20px;
      }
      .info h3 {
        font-size: 0.8rem;
        text-transform: uppercase;
        color: #888;
      }
      .info p {
        font-weight: 700;
        font-size: 1.2rem;
      }

      .box-time {
        border-color: var(--color-blue);
      }
      .box-place {
        border-color: var(--color-pink);
      }
      .box-dress {
        border-color: var(--color-yellow);
      }

      .typewriter-cursor {
        display: inline-block;
        width: 3px;
        background-color: var(--color-pink);
        animation: blink 1s infinite;
        height: 1.4em;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      footer {
        text-align: center;
        margin-top: 40px;
        font-weight: 600;
        color: var(--color-purple);
      }
    </style>
  </head>
  <body>
    <canvas id="falling-petals-canvas"></canvas>
    <audio id="background-music" loop>
      <source src="sound.mp3" type="audio/mpeg" />
    </audio>
    <div id="loader-wrapper">
      <button id="enter-button">🎁 Nhấn để mở tiệc!</button>
    </div>

    <div id="main-content">
      <div class="container">
        <header>
          <div class="photo-container">
            <img src="4.jpg" alt="SEN" class="photo-frame" />
            <img src="7.jpg" alt="SEN" class="photo-frame" />
          </div>
          <h1>Happy Birthday SEN! 🎂</h1>
          <p>Thêm một tuổi mới, thêm nhiều niềm vui! 🥳</p>
        </header>

        <main>
          <h2 class="party-title">✨ THƯ MỜI TỪ SEN ✨</h2>
          <div id="letter-content"></div>

          <div class="details-container" id="details-box">
            <div class="detail-box box-time">
              <div class="icon">⏰</div>
              <div class="info">
                <h3>Thời gian</h3>
                <p>18:00 - Thứ Tư, 04/03/2026</p>
              </div>
            </div>
            <div class="detail-box box-place">
              <div class="icon">📍</div>
              <div class="info">
                <h3>Địa điểm</h3>
                <p>Quán LÚA - HÀM GIANG</p>
              </div>
            </div>
            <div class="detail-box box-dress">
              <div class="icon">👗</div>
              <div class="info">
                <h3>Trang phục</h3>
                <p>Tự do, Rực rỡ càng tốt!</p>
              </div>
            </div>
          </div>
        </main>

        <footer><p>Love, SEN ❤️</p></footer>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("falling-petals-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let petals = [];
      const colors = ["#ff7eb3", "#6dd5fa", "#feca57", "#a29bfe", "#54a0ff"];

      class Petal {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.w = 10 + Math.random() * 15;
          this.h = 10 + Math.random() * 15;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.xSpeed = Math.random() * 2 - 1;
          this.ySpeed = 1 + Math.random() * 2;
          this.rotation = Math.random() * 360;
          this.rotationSpeed = Math.random() * 4 - 2;
        }
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate((this.rotation * Math.PI) / 180);
          ctx.fillStyle = this.color;
          ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
          ctx.restore();
        }
        animate() {
          this.y += this.ySpeed;
          this.x += this.xSpeed;
          this.rotation += this.rotationSpeed;
          if (this.y > canvas.height) {
            this.y = -20;
            this.x = Math.random() * canvas.width;
          }
          this.draw();
        }
      }

      for (let i = 0; i < 80; i++) petals.push(new Petal());
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        petals.forEach((p) => p.animate());
        requestAnimationFrame(animate);
      }
      animate();

      const enterButton = document.getElementById("enter-button");
      const loader = document.getElementById("loader-wrapper");
      const letterContentElement = document.getElementById("letter-content");
      const detailsBox = document.getElementById("details-box");
      const mainContent = document.getElementById("main-content");
      const music = document.getElementById("background-music");

      // Nội dung thư mời mới
      const letterText = `Chào bạn, người đặc biệt của SEN! 💕

Thời gian trôi nhanh quá, SEN lại sắp bước sang một tuổi mới rồi. Nhân dịp đặc biệt này, SEN muốn tổ chức một bữa tiệc nhỏ ấm cúng để cùng những người mình yêu thương nhất đón chào khoảnh khắc ý nghĩa này.

Sẽ thật tuyệt vời nếu bạn có thể dành chút thời gian đến chung vui, cùng SEN thổi nến, cắt bánh và chia sẻ những câu chuyện vui vẻ. Sự hiện diện của bạn chính là món quà sinh nhật quý giá và ý nghĩa nhất đối với SEN đấy! 🎁✨

Mong sớm được gặp bạn tại bữa tiệc nhé!`;

      function typewriter(element, text, speed = 30) {
        let i = 0;
        element.innerHTML = "";
        const cursor = document.createElement("span");
        cursor.className = "typewriter-cursor";
        element.appendChild(cursor);

        function type() {
          if (i < text.length) {
            if (text.charAt(i) === "\n") {
              element.insertBefore(document.createElement("br"), cursor);
            } else {
              element.insertBefore(
                document.createTextNode(text.charAt(i)),
                cursor,
              );
            }
            i++;
            setTimeout(type, speed);
          } else {
            cursor.style.display = "none";
            detailsBox.classList.add("show");
          }
        }
        type();
      }

      enterButton.addEventListener("click", () => {
        loader.classList.add("hidden");
        mainContent.classList.add("show");
        music.play().catch((e) => console.log("Cần tương tác để phát nhạc"));
        document.body.style.overflow = "auto";
        setTimeout(() => typewriter(letterContentElement, letterText), 500);
      });

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
